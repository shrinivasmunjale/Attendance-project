version: "3.9"

services:
  backend:
    build: ./backend
    container_name: attendance_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models_weights:/app/models_weights
    environment:
      - DATABASE_URL=sqlite:///./attendance.db
      - CAMERA_SOURCE=0
    devices:
      - /dev/video0:/dev/video0   # Pass webcam into container (Linux)
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: attendance_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
